<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayWord — Протоколирование ИИ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .recording { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-10 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-xl tracking-wider">SW</div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900">SayWord</h1>
                    <p class="text-xs text-slate-500">Голосовое протоколирование • Radiology AI Lab</p>
                </div>
            </div>
            <div class="flex items-center space-x-2 text-sm text-slate-600 bg-slate-100 px-3 py-1 rounded-full">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-ping"></span>
                <span>Бэкенд VDS: Connected</span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-col items-center justify-center space-y-6 min-h-[300px]">
            <h2 class="text-lg font-semibold text-slate-700 text-center">Управление диктовкой</h2>
            
            <button id="recordBtn" class="w-24 h-24 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-blue-700 transition-all cursor-pointer focus:outline-none">
                <svg id="micIcon" class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            </button>
            
            <div class="text-center">
                <p id="statusText" class="font-medium text-slate-600">Нажмите, чтобы начать запись</p>
                <p id="timer" class="text-sm text-slate-400 mt-1 hidden">00:00</p>
            </div>
        </div>

        <div class="md:col-span-2 bg-white border border-slate-200 rounded-xl p-6 shadow-sm flex flex-col space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <h2 class="text-lg font-bold text-slate-900">Результат генерации ИИ</h2>
                <button id="copyBtn" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">
                    Копировать протокол
                </button>
            </div>

            <div id="loading" class="hidden flex-col items-center justify-center py-12 space-y-3 text-blue-600">
                <svg class="animate-spin h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-sm font-medium text-slate-500">Whisper & Gemma обрабатывают аудио...</span>
            </div>

            <textarea id="resultArea" class="w-full h-96 p-4 bg-slate-50 border border-slate-200 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-700 leading-relaxed font-mono" placeholder="Здесь появится структурированный медицинский протокол после завершения диктовки..."></textarea>
        </div>
    </main>

    <script>
        // Точный адрес вашего VDS-сервера
        const API_URL = 'https://185.105.109.72/process-audio';

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let startTime;
        let timerInterval;

        const recordBtn = document.getElementById('recordBtn');
        const micIcon = document.getElementById('micIcon');
        const statusText = document.getElementById('statusText');
        const timerElement = document.getElementById('timer');
        const resultArea = document.getElementById('resultArea');
        const loading = document.getElementById('loading');

        // Логика кнопки записи
        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        });

        async function startRecording() {
            audioChunks = [];
            try {
                // Запрашиваем доступ к микрофону у браузера
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendAudioToVDS(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;
                
                // Визуальные изменения интерфейса
                recordBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                recordBtn.classList.add('bg-red-500', 'hover:bg-red-600', 'recording');
                statusText.innerText = 'Идет запись... Нажмите еще раз для остановки';
                statusText.classList.add('text-red-500');
                
                // Таймер
                timerElement.classList.remove('hidden');
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);

            } catch (err) {
                console.error('Ошибка доступа к микрофону:', err);
                alert('Не удалось получить доступ к микрофону. Убедитесь, что вы подтвердили SSL-сертификат по адресу ' + API_URL);
            }
        }

        function stopRecording() {
            mediaRecorder.stream.getTracks().forEach(track => track.stop()); // Выключаем физический микрофон
            isRecording = false;

            // Сброс визуала кнопки
            recordBtn.classList.remove('bg-red-500', 'hover:bg-red-600', 'recording');
            recordBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            statusText.innerText = 'Нажмите, чтобы начать запись';
            statusText.classList.remove('text-red-500');
            timerElement.classList.add('hidden');
            clearInterval(timerInterval);
        }

        // Отправка Blob на наш VDS
        async function sendAudioToVDS(blob) {
            resultArea.classList.add('hidden');
            loading.classList.remove('hidden');

            const formData = new FormData();
            // Поле 'file' должно строго совпадать с тем, что ждет FastAPI (UploadFile = File(...))
            formData.append('file', blob, 'voice.webm');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }

                const data = await response.json();
                
                // Выводим результат. Если бэкенд возвращает JSON объект, красиво форматируем его
                if (typeof data === 'object') {
                    resultArea.value = JSON.stringify(data, null, 4);
                } else {
                    resultArea.value = data;
                }

            } catch (error) {
                console.error('Ошибка отправки:', error);
                resultArea.value = `Произошла ошибка при обработке на VDS.\n\nВозможные причины:\n1. Вы не добавили самоподписанный сертификат IP в исключения браузера.\n2. Бэкенд упал.\n\nТехнические детали:\n${error.message}`;
            } finally {
                loading.classList.add('hidden');
                resultArea.classList.remove('hidden');
            }
        }

        // Таймер записи
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');
            timerElement.innerText = `${mins}:${secs}`;
        }

        // Кнопка копирования текста
        document.getElementById('copyBtn').addEventListener('click', () => {
            resultArea.select();
            document.execCommand('copy');
            alert('Протокол скопирован в буфер обмена!');
        });
    </script>
</body>
</html>
